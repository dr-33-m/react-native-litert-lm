name: Build Check

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - 'ios/**'
      - 'src/**'
      - 'cpp/**'
      - 'nitrogen/**'
      - 'package.json'
      - 'react-native-litert-lm.podspec'

jobs:
  android:
    name: Android (Kotlin)
    runs-on: ubuntu-latest
    env:
      SKIP_IOS_FRAMEWORK_DOWNLOAD: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and generate specs
        run: |
          npm install
          npm run specs
          cd example
          npm install
          npx expo prebuild --clean --platform android

      - name: Compile Kotlin
        run: |
          cd example/android
          ./gradlew :react-native-litert-lm:compileDebugKotlin --no-daemon

  ios:
    name: iOS (Swift)
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and generate specs
        run: |
          npm install
          npm run specs
          cd example
          npm install
          npx expo prebuild --clean --platform ios

      - name: Compile Swift
        run: |
          WORKSPACE=$(find example/ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          xcodebuild -workspace "$WORKSPACE" \
            -scheme react-native-litert-lm \
            -sdk iphonesimulator \
            -configuration Debug \
            build
